name: Bug report
description: Something is broken or behaves incorrectly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please **do not include secrets, API keys, or production credentials** in the report.

        For security vulnerabilities, do NOT open a public issue — email security@cogniplane.ai (see [SECURITY.md](../SECURITY.md)).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug. Code snippets, commands, or a small repro repo are very helpful.
      placeholder: |
        1. Run `make dev`
        2. POST /messages with body `{ ... }`
        3. Observe error in backend log
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Output of `node --version`, `pnpm --version`, OS, runtime provider (Codex/Claude), `CLAUDE_RUNTIME_BACKEND` (local/e2b), and the cogniplane-core commit hash.
      placeholder: |
        Node: 24.5.0
        pnpm: 10.32.1
        OS: Ubuntu 24.04
        Runtime: claude-code (local backend)
        Commit: abc1234
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Backend / frontend output, redacted of any secrets. Use code blocks (```).
      render: shell
    validations:
      required: false
