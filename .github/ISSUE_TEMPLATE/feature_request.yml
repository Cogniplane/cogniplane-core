name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Before filing, please search existing issues to see if this has been proposed.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to accomplish? What's getting in the way today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Be as concrete as you can — example API, config, or UI sketch is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why you ruled them out (if applicable).
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links to related issues, prior art in other tools, screenshots, etc.
    validations:
      required: false
