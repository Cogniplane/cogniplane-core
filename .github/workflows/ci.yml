name: CI

# Lint, typecheck, and unit tests for every PR and every push to main.
# License compatibility is gated separately by license-check.yml.
# CLA signing is gated separately by cla.yml.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the scan covers every commit, not just HEAD.
          fetch-depth: 0
      # Run the open-source gitleaks CLI directly (MIT, free for any repo).
      # We deliberately do NOT use gitleaks/gitleaks-action@v2: that wrapper
      # requires a paid GITLEAKS_LICENSE for any org-owned repo (public or
      # private). The CLI has no such gate.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan for secrets
        run: gitleaks detect --config .gitleaks.toml --log-opts='--all' --no-banner --redact

  ci:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # shared-types and frontend: full type check.
      # backend: split into two cheap gates because the full type check exceeds
      # available memory on free GitHub runners. The private CI is the
      # authoritative semantic-type gate for the backend.
      #   - tsc --noCheck: parse + syntax (no semantic diagnostics)
      #   - dpdm:          import resolution (catches TS2307-style breakage)
      - name: Typecheck (shared-types + frontend)
        run: pnpm --filter @cogniplane/shared-types --filter @cogniplane/frontend --workspace-concurrency=1 typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Backend syntax check
        run: pnpm --filter @cogniplane/backend exec tsc -p tsconfig.json --noEmit --noCheck
        env:
          NODE_OPTIONS: --max-old-space-size=2048

      - name: Backend import resolution
        # dpdm's --exit-code only fires on circular deps, so we tee the output
        # and grep for `miss "<module>"` warnings (the TS2307 equivalent).
        run: |
          pnpm --filter @cogniplane/backend exec dpdm --no-tree --no-circular 'src/**/*.ts' 2>&1 | tee /tmp/dpdm.log
          if grep -qE '^\s+[0-9]+\)\s+miss ' /tmp/dpdm.log; then
            echo "::error::dpdm found unresolved imports — see 'miss' entries above"
            exit 1
          fi
        env:
          NODE_OPTIONS: --max-old-space-size=2048

      - name: Tests
        run: pnpm test:all
